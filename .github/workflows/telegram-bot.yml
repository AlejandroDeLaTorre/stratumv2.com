name: Telegram Hashprice Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # snapshot every 6 hours — silent
    - cron: '0 9 * * 1'     # weekly recap — Monday 09:00 UTC only
  workflow_dispatch:

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - name: Save hashprice snapshot to database
        run: |
          curl -s -X GET https://stratumv2.com/api/snapshot \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Check for difficulty adjustment
        run: |
          curl -s -X GET https://stratumv2.com/api/difficulty-alert \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

  weekly-recap:
    runs-on: ubuntu-latest
    needs: snapshot
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 9 * * 1'
    steps:
      - name: Post weekly recap to Telegram
        run: |
          RESPONSE=$(curl -s -X GET https://stratumv2.com/api/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}")
          echo "API Response: $RESPONSE"
