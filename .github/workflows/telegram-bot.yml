name: Telegram Hashprice Bot

on:
  schedule:
    - cron: '0 12 * * *'   # once daily at 12:00 UTC
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Save hashprice snapshot to database
        run: |
          curl -s -X GET https://stratumv2.com/api/snapshot \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Check for difficulty adjustment and alert
        run: |
          curl -s -X GET https://stratumv2.com/api/difficulty-alert \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Post hashprice update to Telegram
        run: |
          curl -s -X GET https://stratumv2.com/api/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
