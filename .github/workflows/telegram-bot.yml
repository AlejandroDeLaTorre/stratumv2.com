name: Telegram Hashprice Bot

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 6 * * *'
    - cron: '0 12 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Save hashprice snapshot to database
        run: |
          curl -s -X GET https://stratumv2.com/api/snapshot \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Post hashprice update to Telegram
        run: |
          curl -s -X GET https://stratumv2.com/api/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"


