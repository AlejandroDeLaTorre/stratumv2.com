name: Telegram Hashprice Bot

on:
  schedule:
    - cron: '0 0 * * *'    # 00:00 UTC
    - cron: '0 6 * * *'    # 06:00 UTC
    - cron: '0 12 * * *'   # 12:00 UTC
    - cron: '0 18 * * *'   # 18:00 UTC
  workflow_dispatch:         # manual trigger from GitHub Actions tab

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Post hashprice update to Telegram
        run: |
          curl -s -X GET https://stratumv2.com/api/cron \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"
