name: Hashprice Snapshot
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Save hashprice snapshot to database
        run: |
          curl -s -X GET https://stratumv2.com/api/snapshot \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Check for difficulty adjustment
        run: |
          curl -s -X GET https://stratumv2.com/api/difficulty-alert \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}"

      - name: Scan recent blocks for DMND JD activity
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: node scripts/scan-jd-blocks.js